name: Auto-build patched APKs

on:
  schedule:
    # Daily at 06:00 UTC. Each app is built only if its upstream version changed.
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      app:
        description: 'App id to build (from config/apps.json), or "all"'
        default: 'all'
        type: string
      force:
        description: 'Build even if the upstream version is unchanged'
        default: false
        type: boolean

permissions:
  contents: write
  issues: write

concurrency:
  group: autobuild-${{ github.ref }}
  cancel-in-progress: false

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
      release_tag: ${{ steps.gen.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v4
      - id: gen
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WANT: ${{ github.event.inputs.app || 'all' }}
        run: |
          if [ "$WANT" = "all" ] || [ -z "$WANT" ]; then
            M=$(jq -c '{include: [.apps[] | {id, name, keystore_secret}]}' config/apps.json)
          else
            M=$(jq -c --arg id "$WANT" '{include: [.apps[] | select(.id==$id) | {id, name, keystore_secret}]}' config/apps.json)
          fi
          TAG=$(jq -r '.release_tag' config/apps.json)
          TITLE=$(jq -r '.release_title // "Morphe patched APKs"' config/apps.json)
          echo "matrix=$M" >>"$GITHUB_OUTPUT"
          echo "release_tag=$TAG" >>"$GITHUB_OUTPUT"
          echo "$M"
          # Ensure the single rolling release exists so matrix jobs can upload to it.
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --title "$TITLE" --notes "Building…"
          fi

  build:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Resolve patch bundle tag
        id: mpp
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO=$(jq -r '.patches_repo' config/apps.json)
          PRE=$(jq -r '.patches_use_prerelease' config/apps.json)
          if [ "$PRE" = "true" ]; then
            TAG=$(gh release list --repo "$REPO" --limit 1 --json tagName --jq '.[0].tagName')
          else
            TAG=$(gh release list --repo "$REPO" --exclude-pre-releases --limit 1 --json tagName --jq '.[0].tagName')
          fi
          echo "repo=$REPO" >>"$GITHUB_OUTPUT"
          echo "tag=$TAG" >>"$GITHUB_OUTPUT"
          echo "Patches: $REPO @ $TAG"

      - name: Download morphe-cli + patches bundle
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p tools
          CLI_REPO=$(jq -r '.cli_repo' config/apps.json)
          gh release download --repo "$CLI_REPO" --pattern '*-all.jar' --dir tools --clobber
          gh release download "${{ steps.mpp.outputs.tag }}" --repo "${{ steps.mpp.outputs.repo }}" --pattern 'patches-*.mpp' --dir tools --clobber
          ls -lh tools

      - name: Decode signing keystore
        env:
          KS_B64: ${{ secrets[matrix.keystore_secret] }}
        run: |
          if [ -z "$KS_B64" ]; then
            echo "::error::Secret ${{ matrix.keystore_secret }} is empty — add it to repo secrets." >&2
            exit 1
          fi
          echo "$KS_B64" | base64 -d > "${RUNNER_TEMP}/${{ matrix.id }}.keystore"

      - name: Build ${{ matrix.name }}
        id: build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APP_ID: ${{ matrix.id }}
          CONFIG: ${{ github.workspace }}/config/apps.json
          KEYSTORE: ${{ runner.temp }}/${{ matrix.id }}.keystore
          RELEASE_TAG: ${{ needs.setup.outputs.release_tag }}
          FORCE: ${{ github.event.inputs.force || 'false' }}
          STATE_OUT: ${{ runner.temp }}/state-${{ matrix.id }}.json
        run: |
          export MORPHE_CLI=$(ls "${{ github.workspace }}"/tools/morphe-cli-*-all.jar | tail -1)
          export MPP=$(ls "${{ github.workspace }}"/tools/patches-*.mpp | tail -1)
          bash scripts/build.sh

      # Hand this app's state to the manifest job (only if it actually built).
      - name: Upload state artifact
        if: steps.build.outputs.built == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: state-${{ matrix.id }}
          path: ${{ runner.temp }}/state-${{ matrix.id }}.json
          if-no-files-found: ignore
          retention-days: 2

      # A patch failure means a patch went stale against a new app version — so the
      # issue is filed on the PATCHES repo when a PAT with access is provided
      # (secret PATCHES_REPO_TOKEN), otherwise on this repo as a fallback. De-duplicated
      # per app+version+failed-patch so a daily re-run comments instead of re-filing.
      - name: Report patch failure
        if: failure() && steps.build.outputs.failed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PATCHES_TOKEN: ${{ secrets.PATCHES_REPO_TOKEN }}
          APP: ${{ matrix.name }}
          VERSION: ${{ steps.build.outputs.version }}
          FAILED: ${{ steps.build.outputs.failed_patches }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          PATCHES_REPO=$(jq -r '.patches_repo' config/apps.json)
          if [ -n "$PATCHES_TOKEN" ]; then
            REPO="$PATCHES_REPO"; export GH_TOKEN="$PATCHES_TOKEN"
          else
            REPO="${{ github.repository }}"; export GH_TOKEN="$GITHUB_TOKEN"
            echo "::warning::No PATCHES_REPO_TOKEN secret — filing on $REPO instead of $PATCHES_REPO."
          fi
          TITLE="$APP $VERSION: patch \"$FAILED\" failed"
          BODY="Auto-build of **$APP $VERSION** failed: patch \`$FAILED\` no longer applies (a fingerprint/layout likely moved in this app version). The published APK was left unchanged.

          - Failed patch(es): \`$FAILED\`
          - App version: \`$VERSION\`
          - Build run: $RUN_URL

          _Filed automatically by [morphe-autobuilds](${{ github.server_url }}/${{ github.repository }})._"
          NUM=$(gh issue list --repo "$REPO" --state open --search "in:title \"$APP $VERSION: patch\"" --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -n "$NUM" ]; then
            gh issue comment "$NUM" --repo "$REPO" --body "Still failing as of $RUN_URL"
          else
            gh issue create --repo "$REPO" --title "$TITLE" --body "$BODY" --label "patch-failure" 2>/dev/null \
              || gh issue create --repo "$REPO" --title "$TITLE" --body "$BODY"
          fi

  manifest:
    needs: [setup, build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download state artifacts
        # No artifacts on a no-change run — don't fail the job over it; manifest.sh
        # then just refreshes notes from the existing manifest.
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          path: states
          pattern: state-*
          merge-multiple: true
      - name: Build manifest.json + refresh notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CONFIG: ${{ github.workspace }}/config/apps.json
          RELEASE_TAG: ${{ needs.setup.outputs.release_tag }}
          STATES_DIR: ${{ github.workspace }}/states
        run: bash scripts/manifest.sh
